name: Deploy Backend API to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Ensure directory exists and has correct permissions
            sudo mkdir -p /var/www/grantmaestroapi
            sudo chown -R ${{ secrets.EC2_USERNAME }}:${{ secrets.EC2_USERNAME }} /var/www/grantmaestroapi
            
            cd /var/www/grantmaestroapi
            
            # Pull latest code
            git pull origin main
            
            # Install dependencies (without sudo to avoid permission issues)
            npm install --production
            
            # Restart PM2 process
            pm2 restart grantmaestro-api || pm2 start src/index.js --name "grantmaestro-api"
            pm2 save
