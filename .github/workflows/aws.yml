name: Deploy Backend
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/grantmaestroapi
            sudo chown -R ubuntu:ubuntu /var/www/grantmaestroapi
            rm -rf /home/ubuntu/node_modules /home/ubuntu/package-lock.json
            cd /var/www/grantmaestroapi
            git clone https://github.com/BigLittleBusiness/grantmaestroapi.git . || git pull origin main
            npm install --omit=dev
            # Update .env with DB secrets if needed
            pm2 restart all || pm2 start src/index.js --name "grantmaestro-api"
