version: '3.8'

services:
  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - ./config/config.env
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: grantmaestro
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
